<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog</title>
    <link rel="icon" type="image/x-icon" href="https://epsilonrepository.github.io/favicon.png">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono" rel="stylesheet">
    <script defer src="../main.js"></script>
    <style>
        .timeline {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px auto 80px auto;
            width: min(90vw, 400px);
        }

        .timeline-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .timeline-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--front));
            opacity: 0.5;
            flex-shrink: 0;
        }
        .timeline-line.mid {
            background: var(--front);
            opacity: 0.5;
            height: 60px;
        }
        .timeline-line.last {
            background: linear-gradient(to bottom, var(--front), transparent);
            opacity: 0.5;
        }

        .timeline-node {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timeline-node.visible {
            opacity: 1;
            transform: scale(1);
        }

        .timeline-node a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 1px solid var(--link);
            background: var(--back);
            box-shadow: 0 0 12px var(--linkshadow);
            font-size: 20px;
            font-family: 'Roboto Mono', monospace;
            color: var(--link);
            text-decoration: none;
            text-shadow: 0 0 6px var(--linkshadow);
            letter-spacing: 0.04em;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        }
        .timeline-node a:hover {
            background: var(--link);
            color: var(--back);
            text-shadow: 0 0 20px var(--front);
            box-shadow: 0 0 20px var(--link);
            text-decoration: none;
        }

        .timeline-node .post-count {
            margin-top: 8px;
            font-size: 12px;
            font-family: 'Roboto Mono', monospace;
            color: var(--front);
            opacity: 0.35;
        }
    </style>
</head>
<body>
    <screen-glow></screen-glow>
    <div class="timeline" id="timeline"></div>

    <script src="blog.js"></script>
    <script>
        const years = [...new Set(POSTS.map(p => p.date.slice(0, 4)))].sort().reverse();

        document.getElementById("timeline").innerHTML = years.map((y, i) => {
            const count = POSTS.filter(p => p.date.startsWith(y)).length;
            const lineClass = i === years.length - 1 ? "last" : "mid";
            const topLineClass = i === 0 ? "timeline-line" : "timeline-line mid";
            return `
                <div class="timeline-segment">
                    <div class="${topLineClass}"></div>
                    <div class="timeline-node">
                        <a href="${y}/">${y}</a>
                        <span class="post-count">${count} post${count !== 1 ? "s" : ""}</span>
                    </div>
                    <div class="timeline-line ${lineClass}"></div>
                </div>
            `;
        }).join("");

        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add("visible");
            });
        }, { threshold: 0.3 });

        document.querySelectorAll(".timeline-node").forEach(n => observer.observe(n));
    </script>
</body>
</html>
